<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SiteClone-AI</title>
  <link rel="stylesheet" href="panel.css">
</head>
<body>
  <div class="header">
    <div class="header-main">
      <h1>SiteClone AI</h1>
      <button id="refresh-btn" class="icon-btn" title="Refresh Current Page">
        <svg fill="currentColor" viewBox="0 0 24 24" height="20" width="20"><path d="M17.65 6.35C16.2 4.9 14.21 4 12 4c-4.42 0-7.99 3.58-7.99 8s3.57 8 7.99 8c3.73 0 6.84-2.55 7.73-6h-2.08c-.82 2.33-3.04 4-5.65 4-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z"/></svg>
      </button>
    </div>
    <div class="header-sub">
      Analyzing: <span id="current-url" class="site-url">-</span>
    </div>
  </div>

  <div class="content-wrapper">
    <button id="analyze-btn" class="primary-btn">Analyze This Site</button>

    <!-- Message Area -->
    <div id="status-message" class="status-msg hidden"></div>

    <!-- Loading Skeleton -->
    <div id="loading-state" class="skeleton-wrapper hidden">
      <div class="skeleton skeleton-text" style="width: 80%"></div>
      <div class="skeleton skeleton-rect" style="height: 100px"></div>
      <div class="skeleton skeleton-text" style="width: 50%"></div>
      <div class="skeleton skeleton-rect" style="height: 150px"></div>
    </div>

    <!-- Results Area -->
    <div id="results-area" class="results hidden">
      <!-- Site Summary -->
      <section class="result-section">
        <h3>SITE SUMMARY</h3>
        <div class="summary-grid">
          <div class="summary-item"><span class="label">Type:</span> <span id="site-type"></span></div>
          <div class="summary-item"><span class="label">Style:</span> <span id="design-style"></span></div>
          <div class="summary-item"><span class="label">Complexity:</span> <span id="complexity"></span></div>
          <div class="summary-item"><span class="label">Build time:</span> <span id="build-time"></span></div>
        </div>
      </section>

      <!-- Clone Prompt -->
      <section class="result-section">
        <div class="section-header">
          <h3>CLONE PROMPT</h3>
          <button id="copy-btn" class="secondary-btn small-btn">Copy</button>
        </div>
        <div class="prompt-container">
          <p id="clone-prompt-text"></p>
        </div>
      </section>

      <!-- Tech Stack -->
      <section class="result-section">
        <h3>TECH STACK</h3>
        <ul id="tech-stack-list" class="tech-list">
          <!-- Populated by JS -->
        </ul>
      </section>

      <!-- Roadmap -->
      <section class="result-section">
        <h3>BUILD ROADMAP</h3>
        <div id="roadmap-list" class="roadmap">
          <!-- Populated by JS -->
        </div>
      </section>

      <!-- Color Palette -->
      <section class="result-section">
        <h3>COLOR PALETTE</h3>
        <div id="color-palette" class="palette-container">
          <!-- Populated by JS -->
        </div>
      </section>

      <!-- Fonts -->
      <section class="result-section">
        <h3>FONTS</h3>
        <div id="fonts-container" class="fonts-list">
          <!-- Populated by JS -->
        </div>
      </section>
    </div>
  </div>

  <script src="panel.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SiteClone-AI V2</title>
  <link rel="stylesheet" href="panel.css">
</head>
<body>
  <div class="header">
    <div class="header-main">
      <h1>SiteClone AI</h1>
      <button id="refresh-btn" class="icon-btn" title="Refresh Current Page">
        <svg fill="currentColor" viewBox="0 0 24 24" height="20" width="20"><path d="M17.65 6.35C16.2 4.9 14.21 4 12 4c-4.42 0-7.99 3.58-7.99 8s3.57 8 7.99 8c3.73 0 6.84-2.55 7.73-6h-2.08c-.82 2.33-3.04 4-5.65 4-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z"/></svg>
      </button>
    </div>
    <div class="header-sub">
      <svg fill="currentColor" viewBox="0 0 24 24" height="14" width="14" style="opacity: 0.6"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 17.93c-3.95-.49-7-3.85-7-7.93 0-.62.08-1.21.21-1.79L9 15v1c0 1.1.9 2 2 2v1.93zm6.9-2.54c-.26-.81-1-1.39-1.9-1.39h-1v-3c0-.55-.45-1-1-1H8v-2h2c.55 0 1-.45 1-1V7h2c1.1 0 2-.9 2-2v-.41c2.93 1.19 5 4.06 5 7.41 0 2.08-.8 3.97-2.1 5.39z"/></svg>
      Analyzing: <span id="current-url" class="site-url">-</span>
    </div>
  </div>

  <div class="content-wrapper">
    <button id="analyze-btn" class="primary-btn">
      <svg fill="currentColor" viewBox="0 0 24 24" height="18" width="18"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z"/></svg>
      Analyze This Site
    </button>

    <!-- Message Area -->
    <div id="status-message" class="status-toast hidden"></div>

    <!-- Loading Skeleton -->
    <div id="loading-state" class="skeleton-area hidden">
      <div class="skeleton" style="height: 100px; margin-bottom: 12px; border-radius: 16px;"></div>
      <div class="skeleton" style="height: 200px; margin-bottom: 12px; border-radius: 16px;"></div>
      <div class="skeleton" style="height: 150px; border-radius: 16px;"></div>
    </div>

    <!-- Results Area -->
    <div id="results-area" class="results hidden">
      
      <!-- Summary -->
      <section class="result-section">
        <h3>
          <svg class="section-icon" fill="currentColor" viewBox="0 0 24 24"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-5 14H7v-2h7v2zm3-4H7v-2h10v2zm0-4H7V7h10v2z"/></svg>
          Site Summary
        </h3>
        <div class="summary-grid">
          <div class="summary-item">
            <span class="label">Site Type</span>
            <span id="site-type" class="value">-</span>
          </div>
          <div class="summary-item">
            <span class="label">Design Style</span>
            <span id="design-style" class="value">-</span>
          </div>
          <div class="summary-item">
            <span class="label">Complexity</span>
            <span id="complexity" class="value">-</span>
          </div>
          <div class="summary-item">
            <span class="label">Build Time</span>
            <span id="build-time" class="value">-</span>
          </div>
        </div>
      </section>

      <!-- Clone Prompt -->
      <section class="result-section">
        <h3>
          <svg class="section-icon" fill="currentColor" viewBox="0 0 24 24"><path d="M16 1H4c-1.1 0-2 .9-2 2v14h2V3h12V1zm3 4H8c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h11c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm0 16H8V7h11v14z"/></svg>
          Clone Prompt
        </h3>
        <div class="prompt-box">
          <button id="copy-btn" class="copy-float-btn">Copy</button>
          <p id="clone-prompt-text"></p>
        </div>
      </section>

      <!-- Tech Stack -->
      <section class="result-section">
        <h3>
          <svg class="section-icon" fill="currentColor" viewBox="0 0 24 24"><path d="M12 2L1 7l11 5 11-5-11-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
          Tech Stack Recommendation
        </h3>
        <div id="tech-stack-list" class="tech-tag-list">
          <!-- Populated by JS -->
        </div>
      </section>

      <!-- Roadmap -->
      <section class="result-section">
        <h3>
          <svg class="section-icon" fill="currentColor" viewBox="0 0 24 24"><path d="M21 5H3v14h18V5zm-2 12H5V7h14v10zM7 9h2v2H7V9zm4 0h2v2h-2V9zm4 0h2v2h-2V9zm-8 4h2v2H7v-2zm4 0h2v2h-2v-2zm4 0h2v2h-2v-2z"/></svg>
          Implementation Roadmap
        </h3>
        <div id="roadmap-list" class="roadmap-container">
          <!-- Populated by JS -->
        </div>
      </section>

      <!-- Color Palette -->
      <section class="result-section">
        <h3>
          <svg class="section-icon" fill="currentColor" viewBox="0 0 24 24"><path d="M12 3c-4.97 0-9 4.03-9 9s4.03 9 9 9c.83 0 1.5-.67 1.5-1.5 0-.39-.15-.74-.39-1.01-.23-.26-.38-.61-.38-.99 0-.83.67-1.5 1.5-1.5H16c2.76 0 5-2.24 5-5 0-4.42-4.03-8-9-8zm-5.5 9c-.83 0-1.5-.67-1.5-1.5S5.67 9 6.5 9s1.5.67 1.5 1.5S7.33 12 6.5 12zm3-4C8.67 8 8 7.33 8 6.5S8.67 5 9.5 5s1.5.67 1.5 1.5S10.33 8 9.5 8zm5 0c-.83 0-1.5-.67-1.5-1.5S13.67 5 14.5 5s1.5.67 1.5 1.5S15.33 8 14.5 8zm3 4c-.83 0-1.5-.67-1.5-1.5S16.67 9 17.5 9s1.5.67 1.5 1.5-.67 1.5-1.5 1.5z"/></svg>
          Color Palette
        </h3>
        <div id="color-palette" class="palette">
          <!-- Populated by JS -->
        </div>
      </section>

      <!-- Fonts -->
      <section class="result-section">
        <h3>
          <svg class="section-icon" fill="currentColor" viewBox="0 0 24 24"><path d="M9.4 16.6L4.8 12l4.6-4.6L8 6l-6 6 6 6 1.4-1.4zm5.2 0l4.6-4.6-4.6-4.6L16 6l6 6-6 6-1.4-1.4z"/></svg>
          Typography
        </h3>
        <div id="fonts-container" class="tech-tag-list">
          <!-- Populated by JS -->
        </div>
      </section>
    </div>
  </div>

  <script src="panel.js"></script>
</body>
</html>

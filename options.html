<!DOCTYPE html>
<html>
<head>
  <title>SiteClone-AI Configuration</title>
  <style>
    :root {
      --bg: #0f0f0f;
      --card: #1a1a1a;
      --accent: #7c3aed;
      --text: #ffffff;
      --border: #2a2a2a;
    }
    body {
      background-color: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      padding: 40px;
      display: flex;
      justify-content: center;
    }
    .config-container {
      background-color: var(--card);
      border: 1px solid var(--border);
      padding: 32px;
      border-radius: 16px;
      width: 480px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    }
    h1 { font-size: 24px; margin-bottom: 8px; color: var(--accent); }
    p { color: #9ca3af; font-size: 14px; margin-bottom: 24px; }
    .form-group { margin-bottom: 20px; }
    label { display: block; margin-bottom: 8px; font-weight: 600; font-size: 14px; }
    input {
      width: 100%;
      padding: 12px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: white;
      font-size: 14px;
      transition: border-color 0.2s;
    }
    input:focus { outline: none; border-color: var(--accent); }
    .btn-save {
      width: 100%;
      padding: 12px;
      background-color: var(--accent);
      color: white;
      border: none;
      border-radius: 8px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    .btn-save:hover { opacity: 0.9; }
    .status {
      margin-top: 16px;
      padding: 10px;
      border-radius: 6px;
      font-size: 13px;
      text-align: center;
      display: none;
    }
    .status.success { background: rgba(16, 185, 129, 0.1); color: #10b981; border: 1px solid rgba(16, 185, 129, 0.2); display: block; }
  </style>
</head>
<body>
  <div class="config-container">
    <h1>Configuration</h1>
    <p>Set up your Groq API Key to start analyzing websites.</p>
    
    <div class="form-group">
      <label for="apiKey">Groq API Key</label>
      <input type="password" id="apiKey" placeholder="gsk_...">
    </div>

    <button id="saveBtn" class="btn-save">Save Configuration</button>
    <div id="status" class="status">Saved Successfully!</div>
    
    <p style="margin-top: 24px; font-size: 12px;">
      Don't have a key? <a href="https://console.groq.com/keys" target="_blank" style="color: var(--accent);">Get one here</a>.
    </p>
  </div>
  <script src="options.js"></script>
</body>
</html>
